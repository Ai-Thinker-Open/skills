name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md files
        run: |
          echo "Checking for SKILL.md files with valid frontmatter..."
          find skills -name "SKILL.md" -type f | while read file; do
            echo "Checking: $file"
            if ! head -1 "$file" | grep -q "^---"; then
              echo "ERROR: $file missing frontmatter"
              exit 1
            fi
            if ! grep -q "^name:" "$file"; then
              echo "ERROR: $file missing name field"
              exit 1
            fi
            if ! grep -q "^description:" "$file"; then
              echo "ERROR: $file missing description field"
              exit 1
            fi
          done
          echo "All SKILL.md files are valid!"

      - name: List skills
        run: |
          echo "Available skills:"
          find skills -name "SKILL.md" -type f | sed 's|skills/||;s|/SKILL.md||' | sort
