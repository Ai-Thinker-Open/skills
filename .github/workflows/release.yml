name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Validate skills
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Package dist
        run: tar -czf skills-${{ github.ref_name }}.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: skills-${{ github.ref_name }}.tar.gz
